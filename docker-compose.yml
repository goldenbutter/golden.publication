#version: "3.9"

services:

  postgres:
    container_name: publications_postgres
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: golden_publications
      POSTGRES_USER: golden_user
      POSTGRES_PASSWORD: golden_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golden_user -d golden_publications"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - appnet

  api:
    container_name: publications_api
    build:
      context: .
      dockerfile: Golden.Publication.Api/Dockerfile
    image: golden-publications-api:latest
    expose:
      - "8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Publications: "Host=postgres;Database=golden_publications;Username=golden_user;Password=golden_pass"
      Auth__Issuer: Golden.Publication.Api
      Auth__Audience: Golden.Publication.Client
      Auth__Key: docker-local-super-secret-signing-key
      Auth__AccessTokenHours: 24
      Auth__RefreshTokenHours: 24
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    networks:
      - appnet

  client:
    container_name: publications_client
    build:
      context: ./client/publications-client
      dockerfile: Dockerfile
    image: golden-publications-client:latest
    expose:
      - "80"
    depends_on:
      - api
    restart: always
    networks:
      - appnet

  reverse-proxy:
    container_name: publications_reverse_proxy
    image: nginx:alpine
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - client
    restart: always
    networks:
      - appnet

volumes:
  postgres_data:

networks:
  appnet:
    driver: bridge
